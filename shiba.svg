<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" width="110" height="110">
  <style>
    .eye-open { animation: blink 4s ease-in-out infinite; }
    .eye-closed { animation: blink-closed 4s ease-in-out infinite; opacity: 0; }
    @keyframes blink {
      0%, 92%, 100% { opacity: 1; }
      94%, 98%      { opacity: 0; }
    }
    @keyframes blink-closed {
      0%, 92%, 100% { opacity: 0; }
      94%, 98%      { opacity: 1; }
    }
    .tail { transform-origin: 91px 68px; animation: wagtail 1.2s ease-in-out infinite; }
    @keyframes wagtail {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(18deg); }
    }
    .blush { animation: blush-fade 3s ease-in-out infinite; }
    @keyframes blush-fade {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 0.85; }
    }
  </style>

  <!-- background rounded rect -->
  <rect width="110" height="110" rx="16" fill="#fdf8ff"/>

  <!-- ── ears ── -->
  <!-- left ear outer -->
  <rect x="18" y="10" width="16" height="18" rx="4" fill="#f5c87a"/>
  <!-- left ear inner -->
  <rect x="21" y="14" width="9" height="11" rx="3" fill="#e8906a"/>
  <!-- right ear outer -->
  <rect x="76" y="10" width="16" height="18" rx="4" fill="#f5c87a"/>
  <!-- right ear inner -->
  <rect x="80" y="14" width="9" height="11" rx="3" fill="#e8906a"/>

  <!-- ── head ── -->
  <rect x="20" y="22" width="70" height="50" rx="10" fill="#f5c87a"/>

  <!-- forehead white patch -->
  <rect x="38" y="23" width="34" height="16" rx="6" fill="#fff8ee" opacity="0.6"/>

  <!-- ── muzzle ── -->
  <rect x="30" y="50" width="50" height="20" rx="8" fill="#fdecd4"/>

  <!-- ── eyes ── -->
  <!-- left eye open -->
  <g class="eye-open">
    <rect x="30" y="33" width="14" height="14" rx="5" fill="#2d1a0e"/>
    <rect x="33" y="35" width="5" height="5" rx="2" fill="#ffffff" opacity="0.55"/>
    <rect x="38" y="40" width="3" height="3" rx="1" fill="#ffffff" opacity="0.35"/>
  </g>
  <!-- left eye closed -->
  <g class="eye-closed">
    <rect x="30" y="38" width="14" height="5" rx="2" fill="#2d1a0e"/>
  </g>
  <!-- right eye open -->
  <g class="eye-open">
    <rect x="66" y="33" width="14" height="14" rx="5" fill="#2d1a0e"/>
    <rect x="69" y="35" width="5" height="5" rx="2" fill="#ffffff" opacity="0.55"/>
    <rect x="74" y="40" width="3" height="3" rx="1" fill="#ffffff" opacity="0.35"/>
  </g>
  <!-- right eye closed -->
  <g class="eye-closed">
    <rect x="66" y="38" width="14" height="5" rx="2" fill="#2d1a0e"/>
  </g>

  <!-- ── nose ── -->
  <rect x="47" y="52" width="16" height="10" rx="5" fill="#3d1a0a"/>
  <!-- nose shine -->
  <rect x="50" y="53" width="5" height="3" rx="2" fill="#ffffff" opacity="0.3"/>

  <!-- ── mouth ── -->
  <rect x="51" y="62" width="3" height="5" rx="1" fill="#c88050" opacity="0.6"/>
  <rect x="44" y="64" width="9" height="3" rx="2" fill="#c88050" opacity="0.5"/>
  <rect x="57" y="64" width="9" height="3" rx="2" fill="#c88050" opacity="0.5"/>

  <!-- ── blush ── -->
  <ellipse cx="27" cy="54" rx="7" ry="5" fill="#f4a0b0" class="blush"/>
  <ellipse cx="83" cy="54" rx="7" ry="5" fill="#f4a0b0" class="blush"/>

  <!-- ── body ── -->
  <rect x="18" y="68" width="72" height="30" rx="10" fill="#f5c87a"/>
  <!-- belly white -->
  <rect x="34" y="70" width="42" height="22" rx="8" fill="#fff8ee" opacity="0.55"/>

  <!-- ── tail ── -->
  <g class="tail">
    <rect x="86" y="60" width="14" height="12" rx="7" fill="#f5c87a"/>
    <rect x="88" y="52" width="12" height="12" rx="6" fill="#f5c87a"/>
    <rect x="90" y="46" width="10" height="10" rx="5" fill="#edb862"/>
  </g>

  <!-- ── legs / paws ── -->
  <!-- front left -->
  <rect x="22" y="88" width="16" height="14" rx="6" fill="#edb862"/>
  <rect x="23" y="96" width="14" height="6" rx="3" fill="#f5c87a"/>
  <!-- front right -->
  <rect x="72" y="88" width="16" height="14" rx="6" fill="#edb862"/>
  <rect x="73" y="96" width="14" height="6" rx="3" fill="#f5c87a"/>
</svg>
